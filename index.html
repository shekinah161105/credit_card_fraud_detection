<!DOCTYPE html>
<html>
<head>

<title>Credit Card Fraud Detection</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(120deg,#2c3e50,#8e44ad);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:35px;
border-radius:15px;
width:380px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
text-align:center;
}

h2{
margin-bottom:25px;
color:#333;
}

input,select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:linear-gradient(90deg,#ff512f,#dd2476);
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#45a049;
}
/* Result Alert */

.result{
margin-top:20px;
padding:12px;
border-radius:8px;
font-size:18px;
font-weight:bold;
}

.fraud{
background:#ff4d4d;
color:white;
animation:blink 1s infinite;
}

.safe{
background:#28a745;
color:white;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0.5;}
100%{opacity:1;}
}

.footer{
margin-top:15px;
font-size:12px;
color:#777;
}

</style>

</head>

<body>

<div class="container">

<h2>💳 Credit Card Fraud Detection</h2>

<form action="/predict" method="post">

<input type="number" name="amount" placeholder="Transaction Amount" required>

<select name="international">
<option value="0">Domestic Transaction</option>
<option value="1">International Transaction</option>
</select>

<select name="chip">
<option value="0">Chip Not Used</option>
<option value="1">Chip Used</option>
</select>

<select name="pin">
<option value="0">PIN Not Used</option>
<option value="1">PIN Used</option>
</select>

<input type="number" name="hour" placeholder="Hour of Day (0-23)" required>

<select name="device">
<option value="0">POS Machine</option>
<option value="1">Mobile</option>
<option value="2">Web</option>
</select>

<button type="submit">Check Transaction</button>

</form>

{% if prediction_text %}

<div class="result {% if 'Fraud' in prediction_text %}fraud{% else %}safe{% endif %}">
{{ prediction_text }}
</div>

{% endif %}



</div>

</body>
</html>
